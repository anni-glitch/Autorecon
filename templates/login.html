<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoRecon SaaS - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 210, 255, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(58, 123, 213, 0.08), transparent 25%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .auth-container:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 30px;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px var(--accent-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px var(--accent-glow);
        }

        .toggle-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .toggle-link {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: text-shadow 0.3s ease;
        }

        .toggle-link:hover {
            text-shadow: 0 0 8px var(--accent-glow);
        }
        
        #error-msg {
            color: #ff4d4d;
            font-size: 14px;
            text-align: center;
            margin-bottom: 15px;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">AutoRecon</div>
        <div id="error-msg"></div>
        
        <form id="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="off" placeholder="Enter username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="off" placeholder="Enter password">
            </div>
            
            <button type="submit" class="btn" id="submit-btn">Sign In</button>
        </form>
        
        <div class="toggle-text">
            <span id="toggle-desc">Scanning for the first time?</span> 
            <a class="toggle-link" id="toggle-mode">Create an account</a>
        </div>
    </div>

    <script>
        let isLogin = true;
        const form = document.getElementById('auth-form');
        const submitBtn = document.getElementById('submit-btn');
        const toggleMode = document.getElementById('toggle-mode');
        const toggleDesc = document.getElementById('toggle-desc');
        const errorMsg = document.getElementById('error-msg');

        toggleMode.addEventListener('click', () => {
            isLogin = !isLogin;
            if (isLogin) {
                submitBtn.textContent = 'Sign In';
                toggleDesc.textContent = 'Scanning for the first time?';
                toggleMode.textContent = 'Create an account';
            } else {
                submitBtn.textContent = 'Register';
                toggleDesc.textContent = 'Already have an account?';
                toggleMode.textContent = 'Sign In';
            }
            errorMsg.textContent = '';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.textContent = '';
            
            const username = form.username.value;
            const password = form.password.value;
            
            const formData = new FormData();
            formData.append('username', username);
            formData.append('password', password);
            
            const url = isLogin ? '/api/token' : '/api/register';
            submitBtn.textContent = 'Processing...';
            submitBtn.style.opacity = '0.7';
            
            try {
                const response = await fetch(url, { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.error || data.detail) {
                    errorMsg.textContent = data.error || data.detail;
                } else if (data.message === "Success") {
                    window.location.href = '/';
                }
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
            } finally {
                submitBtn.textContent = isLogin ? 'Sign In' : 'Register';
                submitBtn.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
